# Veröffentlicht das Demo-Dashboard als öffentliche Live-Seite über GitHub Pages.
# Das Skript erzeugt bei jedem Lauf einen FRISCHEN statischen Snapshot mit
# Beispieldaten (--sample) – keine echten Systeme, keine Anmeldung, kein Server.
# Ergebnis:  https://marcobockelbrink.github.io/vmware/
name: Live-Demo (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - aria_kapa.py
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Immer nur ein Deployment gleichzeitig; laufende nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Demo-Dashboard erzeugen (statischer Snapshot, Beispieldaten)
        run: |
          mkdir -p _site
          python3 aria_kapa.py --sample --output _site/index.html
          echo "Demo erzeugt: $(wc -c < _site/index.html) Bytes"

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
