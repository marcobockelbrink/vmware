# OpenSSF Scorecard – bewertet die Sicherheits-"Hygiene" des Repos
# (verzweigte Schutzregeln, gepinnte Abhängigkeiten, Token-Rechte, aktive
# Wartung u. a.) und liefert eine Punktzahl (0–10) plus einen Badge für die
# README. Ergebnisse landen ebenfalls im Security-Tab. Kostenlos/Open Source.
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 5 * * 1"   # wöchentlich montags 05:27 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard-Analyse
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # Alerts in den Security-Tab
      id-token: write          # veröffentlichte Ergebnisse (Badge)
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Scorecard ausführen
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true   # ermöglicht den öffentlichen Badge

      - name: Ergebnis hochladen
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: scorecard.sarif
          category: scorecard
