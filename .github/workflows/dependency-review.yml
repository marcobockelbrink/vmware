# Prüft bei jedem Pull Request nach main die Änderungen an Abhängigkeiten
# (hier v. a. GitHub-Actions über den Dependency-Graph) und blockt den PR,
# wenn eine bekannte Schwachstelle (ab „high") oder eine unerwünschte Lizenz
# hinzukäme – BEVOR sie in main landet. Kostenlos für öffentliche Repos.
name: Dependency-Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    name: Abhängigkeiten prüfen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
