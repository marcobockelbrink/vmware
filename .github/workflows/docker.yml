# Baut das Container-Image und veröffentlicht es als GitHub Package (GHCR).
# Läuft automatisch bei jedem Release-Tag (v*); manueller Start über
# "Run workflow" ist möglich (optional mit Versionsnummer für den Image-Tag).
#
# Ergebnis:  ghcr.io/marcobockelbrink/kapa-dashboard:latest  und  :<version>
name: Docker-Image (GHCR)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Zusätzlicher Versions-Tag (z. B. 1.30) – leer = nur latest"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      # QEMU + Buildx für Multi-Arch (RHEL-Hosts amd64, Dev-Macs arm64)
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kapa-dashboard
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
