# Zusätzliche Open-Source-Sicherheitsscanner. Alle melden ihre Funde als SARIF
# in den "Security"-Reiter des Repos (dort einsehbar/nachverfolgbar). Die
# Scanner brechen den Lauf bewusst NICHT ab (report-only) – Funde erscheinen als
# Alerts, blockieren aber keine Releases. Alles kostenlos/Open Source.
name: Security-Scan

on:
  push:            # jeder Branch (nicht nur main)
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"   # wöchentlich montags 04:27 UTC

permissions:
  contents: read

jobs:
  # Bandit – Python-spezifischer Security-Linter (subprocess, eval, schwache
  # Krypto, unsichere Temp-Dateien, …).
  bandit:
    name: Bandit (Python-Security)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install "bandit[sarif]"
      - name: Bandit ausführen
        # B311 (random) nur fuer Demo-Daten, B110 (try/except/pass) bewusst;
        # sicherheitskritische Zufallswerte nutzen das secrets-Modul.
        run: bandit -r aria_kapa.py --skip B311,B110 -f sarif -o bandit.sarif || true
      - name: Ergebnis hochladen
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: bandit.sarif
          category: bandit

  # Semgrep – breite, gepflegte Security-Regelsätze (OWASP, Secrets, Python).
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Semgrep ausführen
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep.sarif || true
      - name: Ergebnis hochladen
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # Trivy – scannt Dateisystem und Dockerfile auf Schwachstellen, Fehl-
  # konfigurationen und versehentlich eingecheckte Secrets.
  trivy:
    name: Trivy (Repo + Dockerfile)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Trivy-Dateisystem-Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy.sarif
          exit-code: "0"
      - name: Ergebnis hochladen
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: trivy.sarif
          category: trivy
