# =============================================================================
# VMware Capacity Planning behind nginx at https://<host>/capa/
# (English twin of nginx-kapa.conf — the directives are identical.)
# =============================================================================
# The dashboard runs locally (127.0.0.1:8080 only, see the systemd unit);
# nginx terminates TLS and forwards /capa/ to the local process.
#
# Include it in the EXISTING server{} block on port 443 (the one already
# serving /var/www/html) — e.g. copy the file to /etc/nginx/snippets/ and add
# it inside the server{} block:
#
#   server {
#       listen 443 ssl;
#       ...existing configuration for /var/www/html...
#       include /etc/nginx/snippets/nginx-kapa.conf;
#   }
#
# Then: nginx -t && systemctl reload nginx
# =============================================================================

# Redirect /capa without a slash to /capa/ (important for relative API paths)
location = /capa {
    return 301 /capa/;
}

location /capa/ {
    # The /capa/ prefix is stripped by the trailing slash on proxy_pass:
    # https://host/capa/reservierungen -> http://127.0.0.1:8080/reservierungen
    proxy_pass http://127.0.0.1:8080/;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # The Aria fetch can take a while in large environments
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Limit the session cookie to the sub-path
    proxy_cookie_path / /capa/;
}
