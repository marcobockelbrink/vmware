# =============================================================================
# VMware Kapazitätsplanung hinter nginx unter https://<host>/capa/
# =============================================================================
# Das Dashboard läuft lokal (nur 127.0.0.1:8080, siehe kapa-dashboard.service);
# nginx terminiert TLS und reicht /capa/ an den lokalen Prozess durch.
#
# Einbindung in den BESTEHENDEN server{}-Block auf Port 443 (der bereits
# /var/www/html ausliefert) — Datei z. B. nach /etc/nginx/snippets/ kopieren
# und im server{}-Block ergänzen:
#
#   server {
#       listen 443 ssl;
#       ...bestehende Konfiguration für /var/www/html...
#       include /etc/nginx/snippets/nginx-kapa.conf;
#   }
#
# Danach: nginx -t && systemctl reload nginx
# =============================================================================

# /capa ohne Slash auf /capa/ umleiten (wichtig für relative API-Pfade)
location = /capa {
    return 301 /capa/;
}

location /capa/ {
    # Prefix /capa/ wird durch den abschließenden Slash am proxy_pass entfernt:
    # https://host/capa/reservierungen -> http://127.0.0.1:8080/reservierungen
    proxy_pass http://127.0.0.1:8080/;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Der Aria-Abruf kann bei großen Umgebungen dauern
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Session-Cookie auf den Unterpfad begrenzen
    proxy_cookie_path / /capa/;
}
