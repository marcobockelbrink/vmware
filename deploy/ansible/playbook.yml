---
# VMware Kapazitätsplanung auf die RHEL-9-Flotte ausrollen.
#
#   ansible-galaxy collection install -r deploy/ansible/requirements.yml
#   ansible-playbook -i deploy/ansible/inventory.example.ini \
#       deploy/ansible/playbook.yml --ask-vault-pass
#
# In der Ansible Automation Platform (AAP) stattdessen als Projekt einbinden
# und einen Job-Template auf dieses Playbook zeigen lassen; die Secrets als
# Vault-Credential bzw. Survey/Extra-Vars hinterlegen.
- name: kapa-dashboard installieren und konfigurieren
  hosts: kapa_servers
  become: true
  roles:
    - kapa
