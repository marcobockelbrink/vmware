---
- name: RPM-Quelle prüfen
  ansible.builtin.assert:
    that: kapa_rpm | length > 0
    fail_msg: "kapa_rpm muss gesetzt sein (Pfad, URL oder Paketname des RPM)."

- name: kapa-dashboard installieren
  ansible.builtin.dnf:
    name: "{{ kapa_rpm }}"
    state: present
    disable_gpg_check: true   # bei unsigniertem internem RPM; besser: RPM signieren
  notify: restart kapa-dashboard

- name: Umgebungsdatei /etc/kapa/kapa.env schreiben
  ansible.builtin.template:
    src: kapa.env.j2
    dest: /etc/kapa/kapa.env
    owner: root
    group: kapa
    mode: "0640"
  notify: restart kapa-dashboard

- name: Aria-Passwort ablegen (/etc/kapa/aria.pass)
  ansible.builtin.copy:
    content: "{{ kapa_aria_password }}\n"
    dest: /etc/kapa/aria.pass
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: kapa_aria_password | length > 0
  notify: restart kapa-dashboard

- name: SELinux – nginx darf zum Dienst proxien
  ansible.posix.seboolean:
    name: httpd_can_network_connect
    state: true
    persistent: true
  when:
    - ansible_selinux is defined
    - ansible_selinux.status == "enabled"

- name: nginx-Snippet einbinden
  ansible.builtin.copy:
    src: /etc/kapa/nginx-kapa.conf.sample
    dest: /etc/nginx/conf.d/kapa.conf
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  when: kapa_manage_nginx | bool
  notify: reload nginx

- name: Dienst aktivieren und starten
  ansible.builtin.systemd:
    name: kapa-dashboard
    enabled: "{{ kapa_service_enabled | bool }}"
    state: "{{ kapa_service_state }}"
    daemon_reload: true
