{{- if and (not .Values.secrets.existingSecret) .Values.secrets.ariaPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kapa.fullname" . }}-secrets
  labels:
    {{- include "kapa.labels" . | nindent 4 }}
type: Opaque
stringData:
  ARIA_PASSWORD: {{ .Values.secrets.ariaPassword | quote }}
{{- end }}
