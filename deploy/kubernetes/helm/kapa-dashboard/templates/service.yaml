apiVersion: v1
kind: Service
metadata:
  name: {{ include "kapa.fullname" . }}
  labels:
    {{- include "kapa.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kapa-dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
